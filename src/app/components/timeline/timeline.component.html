<div class="timeline-page">
  <div class="page-header">
    <img src="assets/Group 3@10x.png" alt="Naologic" class="logo-img" />
  </div>

  <div class="page-content">
    <h1 class="page-title">Work Orders</h1>

    <!-- Timescale pill - Day / Week / Month switcher -->
    <div class="timescale-bar">
      <div class="timescale-pill" #timescalePill>
        <span class="timescale-label">Timescale</span>
        <div class="timescale-divider"></div>
        <div class="timescale-dropdown-wrapper">
          <ng-select
            [(ngModel)]="currentView"
            (ngModelChange)="onViewChange($event)"
            [clearable]="false"
            [searchable]="false"
            class="timescale-select"
          >
            @for (opt of viewOptions; track opt.value) {
              <ng-option [value]="opt.value">{{ opt.label }}</ng-option>
            }
          </ng-select>
        </div>
      </div>
    </div>

    <!-- Two-column layout - fixed work-center label strip + scrollable grid -->
    <div class="timeline-container">

      <!-- Fixed left panel - work center names -->
      <div class="left-panel">
        <div class="left-header">Work Center</div>
        @for (wc of workCenters(); track wc.docId) {
          <div
            class="left-row"
            [class.hovered]="hoveredRow() === wc.docId"
            (mouseenter)="hoveredRow.set(wc.docId)"
            (mouseleave)="hoveredRow.set(null)"
          >{{ wc.data.name }}</div>
        }
      </div>

      <!-- Scrollable grid - column headers, rows, bars, ghost placeholder -->
      <app-timeline-grid
        #grid
        [workCenters]="workCenters"
        [workOrders]="workOrders"
        [columns]="columns"
        [columnWidth]="columnWidth"
        [totalGridWidth]="totalGridWidth"
        [view]="currentView"
        [badgeLabel]="currentBadgeLabel()"
        (createRequest)="onCreateRequest($event)"
        (editRequest)="onEdit($event)"
        (deleteRequest)="onDelete($event)"
      />

    </div>
  </div>
</div>

<!-- Slide-out panel for create / edit, rendered outside the grid so it overlays the full page -->
<app-work-order-panel
  [panelMode]="panelMode()"
  (closed)="closePanel()"
  (saved)="closePanel()"
/>
